# FLEETCOM: port deconfliction for running Cascade alongside the
# Midship stack (which holds 6379 redis and opt-in debugpy 5678-5681).
# Auto-loaded by `docker-compose up`. Local-only file — listed in
# .git/info/exclude, do not commit.
#
# App ports are unchanged (client/src/js/core/host.ts hardcodes 8088/8010/8011):
#   web 8010, ws 8011, db 33060, minio 6010/6011.
# Redis host publish moves to 63790 (Django connects via docker DNS redis:6379,
# the host publish is only for redis-cli inspection).
# debugpy host ports move to 15678-15682; attach configs must target these.
# The backend image is built locally (docker-compose-build.yml) and tagged
# with a fixed local name so nothing depends on $AWS_ECR_ACCOUNT_URL / ECR.
services:
  redis:
    ports: !override
      - "63790:6379"
  web:
    image: local_test_web:latest
    ports: !override
      - "8010:8000"
      - "15678:5678"
  ws:
    image: local_test_web:latest
    ports: !override
      - "8011:8001"
      - "15680:5678"
  c3:
    image: local_test_web:latest
    ports: !override
      - "15681-15682:5678"
  c3manager:
    image: local_test_web:latest
    ports: !override
      - "15679:5678"
  test:
    image: local_test_web:latest
