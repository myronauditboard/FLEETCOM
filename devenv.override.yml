# FLEETCOM: conductor port override for auditboard-dev-env's
# docker-compose-supplement-dev.yml. Conductor is skipped in start-background
# and started explicitly with this file layered on (fleetcom-start-all.sh);
# integrations-extract's override lives in extract.override.yml (split so
# older dev-env checkouts without that service still compose validly).
services:
  # Conductor API moves off 8080 (held by Midship WOPI). CONDUCTOR_SERVER_URL
  # in .envrc points at http://localhost:18080/api. UI stays on 3000.
  conductor:
    ports: !override
      - "18080:8080"
      - "3000:5000"
